# Catch-all server_name -- deliberately NOT trying to pattern-match the
# tenant subdomain here. NGINX's job is routing to the right CONTAINER,
# not resolving WHICH tenant a request is for -- that's the tenant
# resolver middleware's job (Phase 2), reading the same Host header this
# config passes through untouched via proxy_set_header. Every subdomain --
# greenvalley.<ip>.nip.io, skyheights.<ip>.nip.io, eventually
# greenvalley.yourdomain.com -- lands on this one server block and gets
# forwarded to the same app container, which tells tenants apart itself.
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Real request size limit for complaint photo uploads (Phase 9 multer
    # config caps at 5MB; give NGINX a little headroom above that rather
    # than matching exactly, so a multipart boundary doesn't push a
    # legitimate 5MB photo over NGINX's own limit before multer even sees it).
    client_max_body_size 6M;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Basic hardening -- cheap to add, no reason not to.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── API: reverse proxy to the backend container ──────────────────────
    location /api/ {
        proxy_pass http://app:4000;
        proxy_http_version 1.1;

        # Host header passed through UNCHANGED -- this is what the tenant
        # resolver middleware reads to identify which society a request
        # belongs to. Rewriting or stripping it here would break
        # multi-tenancy at the routing layer, silently, in a way that
        # would be very confusing to debug from the app side.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cookies (the refresh token) must pass through untouched too.
        proxy_pass_header Set-Cookie;
    }

    # ── Everything else: the React SPA ────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # SPA fallback: any path that isn't a real static file (e.g.
        # /complaints/abc123, a client-side route) falls back to
        # index.html so React Router can handle it. Without this, a
        # hard refresh on any non-root route 404s at the NGINX layer
        # before React ever loads.
        try_files $uri $uri/ /index.html;
    }

    # Static assets get long cache lifetimes -- Vite fingerprints
    # filenames on build (index-Db8ZKbcF.js), so a new deploy naturally
    # gets a new URL and never collides with a stale cached one.
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# HTTPS is added here once a certificate exists (Let's Encrypt via certbot
# -- see infra/ansible/playbook.yml, which sets this up. nip.io domains
# CAN get real Let's Encrypt certificates: they publicly resolve to your
# Elastic IP, so the HTTP-01 challenge works exactly like it would for a
# purchased domain.) Left commented rather than templated with fake paths,
# so this file is valid and servable over plain HTTP immediately, with
# HTTPS as a deliberate next step rather than a broken default:
#
# server {
#     listen 443 ssl;
#     server_name _;
#     ssl_certificate     /etc/letsencrypt/live/<your-domain>/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/<your-domain>/privkey.pem;
#     ... (same location blocks as above)
# }
